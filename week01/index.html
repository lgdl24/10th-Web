<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="./dist/script.js" defer></script>
    <title>UMC TODO</title>
  </head>
  <body class="d-flex flex-column align-items-center">
    <div class="todo-container">
      <h1 class="todo-container__header">Oner TODO</h1>
      <form id="todo-form" class="todo-container__form">
        <input
          type="text"
          id="todo-input"
          class="todo-container__input"
          placeholder="할일을 입력해주세요 "
          maxlength="20"
          required
        />
        <input
          type="date"
          id="todo-date"
          class="todo-container__date"
          min="2026-03-17"
        />
        <button type="submit" class="todo-container__button">할 일 추가</button>
      </form>
      <div class="render-container">
        <div class="render-container__section">
          <h2 class="render-container__title">할일</h2>
          <ul id="todo-list" class="render-container__list">
            <li class="render-container__item">
              <button class="render-container__item-button">완료</button>
            </li>
          </ul>
        </div>
        <div class="render-container__section">
          <h2 class="render-container__title">완료</h2>
          <ul id="done-list" class="render-container__list">
            <li class="render-container__item">
              <button class="render-container__item-button">삭제</button>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </body>
</html>
